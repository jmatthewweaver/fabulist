# /etc/nginx/sites-available/fabulist

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name thefabulist.app www.thefabulist.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name thefabulist.app www.thefabulist.app;

    ssl_certificate     /etc/ssl/fabulist/fullchain.pem;
    ssl_certificate_key /etc/ssl/fabulist/thefabulist.app-PrivateKey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Served images (static files from backend)
    location /images/ {
        alias /home/fabulist/data/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend health check
    location /health {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Auth endpoints
    location /auth/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket game sessions (must come before generic /api/)
    location ~ ^/api/playthroughs/[^/]+/play {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---------------------------------------------------------------------------
# Admin control panel (admin.py) — on its own HTTPS port so its absolute paths
# and its /api/* don't collide with the main site. Reuses the same certificate.
#
# After enabling, open the port:   sudo ufw allow 8443/tcp
# Web UI:   https://thefabulist.app:8443
# Token API e.g.:  curl -H "X-Admin-Key: $KEY" https://thefabulist.app:8443/api/logs/backend
# ---------------------------------------------------------------------------
server {
    listen 8443 ssl;
    server_name thefabulist.app www.thefabulist.app;

    ssl_certificate     /etc/ssl/fabulist/fullchain.pem;
    ssl_certificate_key /etc/ssl/fabulist/thefabulist.app-PrivateKey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs can be sizable; allow a slower client and bigger responses.
    proxy_read_timeout 120;

    location / {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
